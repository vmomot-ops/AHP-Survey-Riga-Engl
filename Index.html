// Paste the Web-App URL of the NEW Apps Script deployment here (the one bound
// to the "MCRI AHP Results" spreadsheet). Do NOT reuse the LEEPS endpoint.
const SCRIPT_URL   = "https://script.google.com/macros/s/AKfycbyYGbinKqqdhjR_9f4XOfZs9WxPk1-P_-w32fCDP9bX7VdmWGvlsI2e5sm-IWKWryym/exec";
const DB_NAME      = "MCRI AHP Results";   // logical database name (sent with every request)
const ADMIN_SECRET = "mcri2026";
</script>
<div id="app"></div>

<script>
// ── CRITERIA (renamed from CR to avoid collision with Consistency Ratio) ──────
const CRIT = [
  {code:"GE", name:"Government effectiveness",       desc:"WGI — World Bank"},
  {code:"RL", name:"Rule of law",                    desc:"WGI — World Bank"},
  {code:"AC", name:"Anti-corruption capacity",       desc:"CPI — Transparency International"},
  {code:"IT", name:"Institutional trust",            desc:"Freedom House Nations in Transit"},
  {code:"DG", name:"E-governance",                   desc:"UN EGDI"},
  {code:"HR", name:"Human resource capacity",        desc:"SIGMA / OECD-EU"},
  {code:"CC", name:"Crisis management",              desc:"INFORM Risk Index (inv.)"},
];
const PCA_W = {GE:.214, RL:.189, AC:.259, IT:.244, DG:.088, HR:.112, CC:.094};
const SAATY_VAL = [1/9,1/7,1/5,1/3,1,3,5,7,9];
const SAATY_TXT = ["1/9","1/7","1/5","1/3","1","3","5","7","9"];
const MAG_UA    = ["moderate","substantial","strong","very strong","absolute"];
const PAIRS = [];
for(let i=0;i<7;i++) for(let j=i+1;j<7;j++) PAIRS.push([i,j]);

// ── AHP math ─────────────────────────────────────────────────
function buildMatrix(sl){
  const A = Array.from({length:7}, ()=>Array(7).fill(1));
  PAIRS.forEach(([i,j])=>{
    const v = sl[i+"_"+j] ?? 4;
    // v<4 → left criterion (i) is more important → A[i][j] > 1
    // v>4 → right criterion (j) is more important → A[j][i] > 1
    A[i][j] = 1 / SAATY_VAL[v];
    A[j][i] = SAATY_VAL[v];
  });
  return A;
}
function calcWeights(A){
  const n = A.length;
  const colSum = Array(n).fill(0);
  for(let j=0;j<n;j++) for(let i=0;i<n;i++) colSum[j] += A[i][j];
  const norm = A.map(row => row.map((v,col) => v / colSum[col]));
  return norm.map(row => row.reduce((a,b)=>a+b,0) / n);
}
function calcLambdaMax(A, w){
  let lam = 0;
  for(let i=0;i<7;i++){
    let aw = 0;
    for(let j=0;j<7;j++) aw += A[i][j]*w[j];
    lam += aw / w[i];
  }
  return lam / 7;
}
function calcCR(lambdaMax){
  const ci = (lambdaMax - 7) / 6;
  return { ci, cr: ci / 1.32 };
}
function geoMeanWeights(allW){
  if(!allW.length) return null;
  const n = allW[0].length;
  const raw = Array.from({length:n}, (_, i)=>{
    const prod = allW.reduce((acc, wv) => acc * wv[i], 1);
    return Math.pow(prod, 1/allW.length);
  });
  const s = raw.reduce((a,b)=>a+b, 0);
  return raw.map(v => v/s);
}
function fmt(v){ return (v*100).toFixed(2)+"%"; }

// ── API ───────────────────────────────────────────────────────
async function apiSave(data){
  try{
    const r = await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({...data, db:DB_NAME})});
    const j = await r.json();
    return j.ok ? {ok:true} : {ok:false, err:j.error||"Server error"};
  }catch(e){ return {ok:false, err:"Network error: "+e.message}; }
}
async function apiLoad(secret){
  try{
    const r = await fetch(SCRIPT_URL+"?secret="+encodeURIComponent(secret)+"&db="+encodeURIComponent(DB_NAME));
    const j = await r.json();
    if(j.error) return {ok:false, err:j.error};
    return {ok:true, rows:j.rows||[]};
  }catch(e){ return {ok:false, err:String(e)}; }
}
async function apiClear(secret, group){
  try{
    const r = await fetch(SCRIPT_URL,{method:"POST",
      body:JSON.stringify({_action:"clear",secret,group:group||"",db:DB_NAME})});
    const j = await r.json();
    return j.ok ? {ok:true} : {ok:false, err:j.error};
  }catch(e){ return {ok:false, err:String(e)}; }
}

      </div>
    </div>
  </div>
  <div style="padding:24px 24px 60px;max-width:960px;margin:0 auto">
    ${S.tab==="info"   ? buildInfo()   : ""}

    LEEPS Project · MIIS/MCRI · Alfred Nobel University, Dnipro ·

    Kyiv School of Public Management
  </div>`;
}

// ── Respondent visualisation (inline expanded row) ────────────
function buildRespondentViz(r){
  const weights = CRIT.map(c => parseFloat(r["w_"+c.code])||0);
  const sumW = weights.reduce((a,b)=>a+b,0);
  const normW = sumW>0 ? weights.map(v=>v/sumW) : weights.map(()=>1/7);
  const maxW = Math.max(...normW);
  const crVal = parseFloat(r.cr)||0;

  // Spider / radar — adaptive scaling (min→25% radius, max→90% radius)
  const N=7, cx=90, cy=90, R=70;
  const wMin = Math.min(...normW);
  const wMax = Math.max(...normW);
  const wRange = wMax - wMin || 0.001;
  // Map weight to radius: min→0.15*R, max→0.92*R (adaptive)
  const adaptR = (w) => R * (0.15 + 0.77 * (w - wMin) / wRange);
  const angles = CRIT.map((_,i) => (i/N)*2*Math.PI - Math.PI/2);
  const pts = (normArr, scaleFn) => angles.map((a,i) => {
    const r2 = scaleFn(normArr[i]);
    return [cx + r2*Math.cos(a), cy + r2*Math.sin(a)];
  });
  // PCA reference on same adaptive scale
  const pcaW = CRIT.map(c => PCA_W[c.code]);
  const pcaSum = pcaW.reduce((a,b)=>a+b,0);
  const pcaNorm = pcaW.map(v=>v/pcaSum);
  const poly = pts2 => pts2.map(p=>p.join(",")).join(" ");
  // Grid circles at 25/50/75/100% of adaptive range
  const gridLevels = [0.25, 0.5, 0.75, 1.0];

  const svgStr = `<svg width="180" height="180" viewBox="0 0 180 180"
    xmlns="http://www.w3.org/2000/svg">
    ${gridLevels.map(lv=>`
      <polygon points="${poly(angles.map(a=>{
        const rr = R*(0.15+0.77*lv);
        return [cx+rr*Math.cos(a), cy+rr*Math.sin(a)];
      }))}" fill="none" stroke="${lv===1.0?'#bfdbfe':'#e2e8f0'}"
        stroke-width="${lv===1.0?'1.5':'1'}"/>`).join('')}
    ${angles.map((a,i)=>`
      <line x1="${cx}" y1="${cy}"
        x2="${cx+R*0.92*Math.cos(a)}" y2="${cy+R*0.92*Math.sin(a)}"
        stroke="#e2e8f0" stroke-width="1"/>`).join('')}
    <polygon points="${poly(pts(pcaNorm, w=>{
      const mapped = 0.15 + 0.77*(w - wMin)/wRange;
      return R * Math.max(0.15, Math.min(0.92, mapped));
    }))}"
      fill="#dbeafe40" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="${poly(pts(normW, adaptR))}"
      fill="#2563eb18" stroke="#2563eb" stroke-width="2.5"/>
    ${pts(normW, adaptR).map(([x,y])=>
      `<circle cx="${x}" cy="${y}" r="3.5" fill="#2563eb"/>`).join('')}
    ${angles.map((a,i)=>{
      const lx=cx+(R+14)*Math.cos(a), ly=cy+(R+14)*Math.sin(a);
      const wPct=(normW[i]*100).toFixed(1);
      return `<text x="${lx}" y="${ly-4}" text-anchor="middle"
          dominant-baseline="middle" font-size="9" font-weight="700"
          fill="#2563eb" font-family="monospace">${CRIT[i].code}</text>
        <text x="${lx}" y="${ly+6}" text-anchor="middle"
          dominant-baseline="middle" font-size="8" fill="#64748b">${wPct}%</text>`;
    }).join('')}
  </svg>`;

    return `<div style="padding:16px 20px;display:grid;
    grid-template-columns:180px 1fr;gap:20px;align-items:start">
    <!-- spider -->
    <div>
      <div style="font-size:11px;font-weight:600;color:#64748b;margin-bottom:4px;text-align:center">
        Radar chart</div>
      <div style="font-size:10px;color:#94a3b8;text-align:center;margin-bottom:6px">
        <span style="display:inline-block;width:16px;height:2px;
          background:#93c5fd;vertical-align:middle"></span> w^PCA &nbsp;
        <span style="display:inline-block;width:16px;height:2px;
          background:#2563eb;vertical-align:middle"></span> w^AHP
      </div>
      ${svgStr}
    </div>
    <!-- bar breakdown -->
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;
        margin-bottom:10px;flex-wrap:wrap;gap:6px">

function doCalc(){

//  STATISTICAL ANALYSIS PANEL
// ─────────────────────────────────────────────────────────────

function quantile(sorted, p) {
  const idx = (sorted.length - 1) * p;
  const lo = Math.floor(idx), hi = Math.ceil(idx);
  if (lo === hi) return sorted[lo];
  return sorted[lo] + (sorted[hi] - sorted[lo]) * (idx - lo);
}
function arrMean(a) { return a.reduce((s,v)=>s+v,0)/a.length; }
function arrStd(a, m) {
  if (a.length < 2) return 0;
  const mn = m ?? arrMean(a);
  return Math.sqrt(a.reduce((s,v)=>s+(v-mn)**2,0)/(a.length-1));
}
function arrSkew(a, m, s) {
  if (a.length < 3) return null;
  const mn=m??arrMean(a), sd=s??arrStd(a,mn);
  if (!sd) return null;
  const n=a.length;
  return (n/((n-1)*(n-2)))*a.reduce((s,v)=>s+((v-mn)/sd)**3,0);
}
function arrKurt(a, m, s) {
  if (a.length < 4) return null;
  const mn=m??arrMean(a), sd=s??arrStd(a,mn);
  if (!sd) return null;
  const n=a.length;
  const k4=a.reduce((s,v)=>s+((v-mn)/sd)**4,0);
  return (n*(n+1))/((n-1)*(n-2)*(n-3))*k4 - 3*(n-1)**2/((n-2)*(n-3));
}

function buildStatPanel(rows) {
  const PCOLS = ["#2563eb","#0891b2","#059669","#7c3aed","#dc2626","#d97706","#0f172a"];

  // Extract per-criterion arrays
  const data = CRIT.map(c => rows.map(r => parseFloat(r["w_"+c.code])||0));

  // Compute stats for each criterion
  const stats = CRIT.map((c,i) => {
    const arr = [...data[i]].sort((a,b)=>a-b);
    const mn  = arrMean(arr);
    const sd  = arrStd(arr, mn);
    const q1  = quantile(arr, 0.25);
    const q2  = quantile(arr, 0.50);
    const q3  = quantile(arr, 0.75);
    const iqr = q3 - q1;
    const wLo = Math.max(arr[0], q1 - 1.5*iqr);
    const wHi = Math.min(arr[arr.length-1], q3 + 1.5*iqr);
    const outliers = arr.filter(v => v < wLo || v > wHi);
    return { code:c.code, name:c.name, arr, mn, sd, q1, q2, q3, iqr,
      wLo, wHi, outliers,
      min:arr[0], max:arr[arr.length-1],
      cv: mn > 0 ? sd/mn : 0,
      skew: arrSkew(arr, mn, sd),
      kurt: arrKurt(arr, mn, sd)
    };
  });

  // ── Box-plot SVG ──────────────────────────────────────────────
  const svgW=720, svgH=300;
  const ml=58, mr=16, mt=28, mb=62;
  const pw=svgW-ml-mr, ph=svgH-mt-mb;
  const colW=pw/7;
  const allVals=data.flat();
  const yMax=Math.max(...allVals)*1.18, yMin=0;
  const yS=v => ph-(v-yMin)/(yMax-yMin)*ph;

  // Y-axis ticks at 5% intervals
  const yTicks=[];
  for(let t=0;t<=yMax+0.001;t+=0.05) yTicks.push(parseFloat(t.toFixed(3)));

  const boxSVG=`<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}"

    <line x1="${ml}" y1="${mt}" x2="${ml}" y2="${mt+ph}" stroke="#cbd5e1" stroke-width="1.5"/>
    <line x1="${ml}" y1="${mt+ph}" x2="${ml+pw}" y2="${mt+ph}" stroke="#cbd5e1" stroke-width="1.5"/>
    <!-- Y grid + labels -->
    ${yTicks.map(t=>{
      const y=mt+yS(t);
      return `<line x1="${ml-4}" y1="${y}" x2="${ml+pw}" y2="${y}"
        stroke="${t===0?'#94a3b8':'#f1f5f9'}" stroke-width="${t===0?1.2:0.8}"/>

    <!-- Boxes -->
    ${stats.map((s,i)=>{
      const cx=ml+i*colW+colW/2;
      const bw=Math.min(colW*0.52,38);
      const x1=cx-bw/2, x2=cx+bw/2;
      const yQ1=mt+yS(s.q1), yQ2=mt+yS(s.q2), yQ3=mt+yS(s.q3);
      const yWL=mt+yS(s.wLo), yWH=mt+yS(s.wHi), yMn=mt+yS(s.mn);
      const col=PCOLS[i];
      return `

        <line x1="${cx}" y1="${yQ1}" x2="${cx}" y2="${yWL}" stroke="${col}" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7"/>
        <!-- whisker caps -->
        <line x1="${cx-bw*0.3}" y1="${yWH}" x2="${cx+bw*0.3}" y2="${yWH}" stroke="${col}" stroke-width="1.8"/>
        <line x1="${cx-bw*0.3}" y1="${yWL}" x2="${cx+bw*0.3}" y2="${yWL}" stroke="${col}" stroke-width="1.8"/>
        <!-- IQR box -->
        <rect x="${x1}" y="${yQ3}" width="${bw}" height="${Math.max(yQ1-yQ3,1)}"
          fill="${col}28" stroke="${col}" stroke-width="2" rx="3"/>
        <!-- median -->
        <line x1="${x1}" y1="${yQ2}" x2="${x2}" y2="${yQ2}"
          stroke="${col}" stroke-width="3"/>
        <!-- mean diamond -->
        <polygon points="${cx},${yMn-5} ${cx+5},${yMn} ${cx},${yMn+5} ${cx-5},${yMn}"

    <!-- Legend -->
    <rect x="${ml}" y="${mt+ph+52}" width="11" height="11"
      fill="#2563eb28" stroke="#2563eb" stroke-width="2" rx="2"/>
    <text x="${ml+15}" y="${mt+ph+60}" font-size="9" fill="#475569" dominant-baseline="middle">IQR (Q1–Q3)</text>
    <line x1="${ml+88}" y1="${mt+ph+57}" x2="${ml+104}" y2="${mt+ph+57}"

      fill="#2563eb" opacity="0.85"/>
    <text x="${ml+177}" y="${mt+ph+60}" font-size="9" fill="#475569" dominant-baseline="middle">Mean (◆)</text>
    <line x1="${ml+258}" y1="${mt+ph+52}" x2="${ml+258}" y2="${mt+ph+62}"
      stroke="#2563eb" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7"/>
    <text x="${ml+264}" y="${mt+ph+60}" font-size="9" fill="#475569" dominant-baseline="middle">Whisker (±1.5·IQR)</text>
    <circle cx="${ml+358}" cy="${mt+ph+57}" r="4"
      fill="none" stroke="#2563eb" stroke-width="1.8" opacity="0.9"/>
    <text x="${ml+366}" y="${mt+ph+60}" font-size="9" fill="#475569" dominant-baseline="middle">Outlier</text>
  </svg>`;

  // ── Descriptive stats table ───────────────────────────────────
  function cvColor(cv) {
    return cv<0.15?"#15803d":cv<0.30?"#a16207":"#dc2626";
  }
  function skewInterp(sk) {
    if (sk===null) return "—";
    if (Math.abs(sk)<0.5) return `${sk.toFixed(2)} (symm.)`;
    if (sk>0) return `${sk.toFixed(2)} (right↗)`;
    return `${sk.toFixed(2)} (left↙)`;
  }
  function kurtInterp(ku) {
    if (ku===null) return "—";
    if (Math.abs(ku)<0.5) return `${ku.toFixed(2)} (normal)`;

  const statsTable=`<table class="rtable">

// ─────────────────────────────────────────────────────────────
//  K-MEANS CLUSTERING
// ─────────────────────────────────────────────────────────────
function buildClusterSection(rows) {
  if (rows.length < 4) return `<p style="font-size:11px;color:#94a3b8;margin-top:8px">
    ℹ Clustering requires at least 4 responses.</p>`;

  const k = rows.length >= 9 ? 3 : 2;
  const PCOLS_C = ["#2563eb","#059669","#dc2626","#7c3aed"];
  const CNAMES  = ["Cluster A","Cluster B","Cluster C","Cluster D"];

  const points = rows.map(r => CRIT.map(c => parseFloat(r["w_"+c.code])||0));

  function dist2(a,b){ return a.reduce((s,v,i)=>s+(v-b[i])**2,0); }

  function runKMeans(pts, k, seed) {
    // k-means++ init with pseudo-random seed
    let rng = seed;
    const rand = () => { rng=(rng*1664525+1013904223)&0xffffffff; return (rng>>>0)/4294967296; };

    let cents = [pts[Math.floor(rand()*pts.length)]];
    for (let ki=1;ki<k;ki++) {
      const ds = pts.map(p=>Math.min(...cents.map(c=>dist2(p,c))));
      const sum = ds.reduce((a,b)=>a+b,0);
      let r=rand()*sum, cum=0;
      for (let pi=0;pi<pts.length;pi++){
        cum+=ds[pi];
        if(cum>=r){ cents.push(pts[pi]); break; }
      }
      if(cents.length<ki+1) cents.push(pts[pts.length-1]);
    }

    let assign = new Array(pts.length).fill(0);
    for (let iter=0;iter<100;iter++){
      const na = pts.map(p=>{
        let best=0, bd=dist2(p,cents[0]);
        for(let ki=1;ki<k;ki++){ const d=dist2(p,cents[ki]); if(d<bd){bd=d;best=ki;} }
        return best;
      });
      if(na.every((v,i)=>v===assign[i])) break;
      assign=na;
      cents=Array.from({length:k},(_,ki)=>{
        const mem=pts.filter((_,pi)=>assign[pi]===ki);
        if(!mem.length) return cents[ki];
        return CRIT.map((_,di)=>mem.reduce((s,p)=>s+p[di],0)/mem.length);
      });
    }
    const inertia=pts.reduce((s,p,pi)=>s+dist2(p,cents[assign[pi]]),0);
    return {assign, cents, inertia};
  }

  // Run 8 restarts, pick best inertia
  let best = null;
  for (let s=1;s<=8;s++){
    const res=runKMeans(points,k,s*31337);
    if(!best||res.inertia<best.inertia) best=res;
  }
  const {assign, cents} = best;

  // Sort clusters by cluster mean of first PCA criterion (AC) desc for stable naming
  const clusterOrder = Array.from({length:k},(_,ki)=>ki)
    .sort((a,b)=>cents[b][2]-cents[a][2]); // sort by AC weight desc
  const clusterLabel = new Array(k);
  clusterOrder.forEach((ki,rank)=>{ clusterLabel[ki]=rank; });

  // Build cluster summaries
  const clusterData = Array.from({length:k},(_,ki)=>{
    const memberIdx = rows.map((_,pi)=>assign[pi]===ki?pi:-1).filter(v=>v>=0);
    const members = memberIdx.map(pi=>rows[pi]);
    const topCrit = CRIT.map((c,di)=>({code:c.code,name:c.name,w:cents[ki][di]}))
      .sort((a,b)=>b.w-a.w);
    return {ki, label:clusterLabel[ki], members, topCrit, cent:cents[ki]};
  }).sort((a,b)=>a.label-b.label);

  // Mini radar SVG for each cluster centroid
  function miniRadar(cent, col) {
    const N=7, cx=65, cy=65, R=50;
    const wMin=Math.min(...cent), wMax=Math.max(...cent), wR=wMax-wMin||0.001;
    const aR = w => R*(0.18+0.75*(w-wMin)/wR);
    const angs = CRIT.map((_,i)=>(i/N)*2*Math.PI-Math.PI/2);
    const pts = angs.map((a,i)=>{
      const r2=aR(cent[i]);
      return [cx+r2*Math.cos(a), cy+r2*Math.sin(a)];
    });
    const poly = pts.map(p=>p.join(",")).join(" ");
    const grid=[0.33,0.67,1.0].map(lv=>{
      const gp=angs.map(a=>{const r2=R*(0.18+0.75*lv);return [cx+r2*Math.cos(a),cy+r2*Math.sin(a)];});
      return `<polygon points="${gp.map(p=>p.join(",")).join(" ")}"
        fill="none" stroke="${lv===1?'#cbd5e1':'#f1f5f9'}" stroke-width="${lv===1?1.2:0.8}"/>`;
    }).join('');
    const spokes=angs.map(a=>`<line x1="${cx}" y1="${cy}"
      x2="${cx+R*0.93*Math.cos(a)}" y2="${cy+R*0.93*Math.sin(a)}"
      stroke="#f1f5f9" stroke-width="0.8"/>`).join('');
    const labels=angs.map((a,i)=>{
      const lx=cx+(R+12)*Math.cos(a), ly=cy+(R+12)*Math.sin(a);
      return `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle"
        font-size="9" font-weight="700" fill="${col}" font-family="monospace">${CRIT[i].code}</text>`;
    }).join('');
    return `<svg width="130" height="130" viewBox="0 0 130 130" xmlns="http://www.w3.org/2000/svg">
      ${grid}${spokes}
      <polygon points="${poly}" fill="${col}20" stroke="${col}" stroke-width="2"/>
      ${pts.map(([x,y])=>`<circle cx="${x}" cy="${y}" r="3" fill="${col}"/>`).join('')}
      ${labels}
    </svg>`;
  }

  // Silhouette-like separation comment
  function dispersion(memberPts) {
    if (memberPts.length<2) return 0;
    let s=0, cnt=0;
    for(let i=0;i<memberPts.length;i++)
      for(let j=i+1;j<memberPts.length;j++){s+=Math.sqrt(dist2(memberPts[i],memberPts[j]));cnt++;}
    return s/cnt;
  }

  const totalDisp = dispersion(points);

  return `
  <div style="border-top:1.5px solid #e2e8f0;margin-top:20px;padding-top:18px">
    <div style="font-size:12px;font-weight:600;color:#475569;margin-bottom:4px">
      🎯 Respondent clustering (k-means, k=${k})</div>
    <p style="font-size:11px;color:#64748b;margin-bottom:14px">
      Euclidean distance in 7-dimensional weight space · 8 restarts ·
      k-means++ initialisation · total sample dispersion: ${(totalDisp*100).toFixed(2)}%</p>
    <div style="display:grid;grid-template-columns:repeat(${k},1fr);gap:12px">
      ${clusterData.map(({ki,label,members,topCrit,cent})=>{
        const col=PCOLS_C[label];
        const cname=CNAMES[label];
        const mDisp=dispersion(members.map((_,mi)=>points[rows.indexOf(members[mi])]
          ??points.find((_,pi)=>rows[pi]===members[mi])));
        return `<div style="background:#f8fafc;border:2px solid ${col}55;
          border-radius:12px;padding:14px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
            <span style="font-weight:700;color:${col};font-size:14px">${cname}</span>
            <span style="font-size:11px;background:${col}18;color:${col};
              padding:2px 9px;border-radius:12px;font-weight:600">n=${members.length}</span>
          </div>
          <!-- mini radar -->
          <div style="display:flex;justify-content:center;margin-bottom:8px">
            ${miniRadar(cent,col)}
          </div>
          <!-- centroid top weights -->
          <div style="margin-bottom:8px">
            ${topCrit.slice(0,7).map(t=>{
              const pct=(t.w/Math.max(...cent)*100).toFixed(0);
              return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
                <span class="mono" style="font-size:10px;font-weight:700;color:${col};width:26px">${t.code}</span>
                <div style="flex:1;height:4px;background:#f1f5f9;border-radius:2px">
                  <div style="width:${pct}%;height:100%;background:${col};border-radius:2px"></div>
                </div>
                <span class="mono" style="font-size:10px;color:#475569;width:36px;text-align:right">
                  ${(t.w*100).toFixed(1)}%</span>
              </div>`;
            }).join('')}
          </div>
          <!-- member list -->
          <div style="border-top:1px solid ${col}33;padding-top:8px">
            <div style="font-size:10px;color:#94a3b8;margin-bottom:4px">Participants:</div>
            <div style="display:flex;flex-wrap:wrap;gap:3px">
              ${members.map(m=>`<span style="display:inline-block;padding:2px 8px;
                background:#fff;border:1px solid ${col}44;border-radius:10px;
                font-size:10px;color:#475569">${m.name||"Anonymous"}</span>`).join('')}
            </div>
          </div>
          <div style="font-size:10px;color:#94a3b8;margin-top:6px">
            Within-cluster dispersion: ${(mDisp*100).toFixed(2)}%</div>
        </div>`;
      }).join('')}
    </div>
    <p style="font-size:10px;color:#94a3b8;margin-top:8px">
      Cluster profile: centroid radar chart (adaptive scale) ·
      within-cluster dispersion — mean pairwise Euclidean distance between members</p>
  </div>`;
}

// ─────────────────────────────────────────────────────────────
//  ADVANCED STATS — helpers
// ─────────────────────────────────────────────────────────────
function normalCDF(x) {
  const t=1/(1+0.2316419*Math.abs(x));
  const d=0.3989423*Math.exp(-x*x/2);
  const p=d*t*(0.3193815+t*(-0.3565638+t*(1.7814779+t*(-1.8212560+t*1.3302744))));
  return x>=0?1-p:p;
}
function chi2pval(chi2v, df) {
  // Wilson-Hilferty normal approximation
  const h=1-2/(9*df);
  const z=((chi2v/df)**(1/3)-h)/Math.sqrt(2/(9*df));
  return 1-normalCDF(z);
}
function pearsonR(x, y) {
  const n=x.length, mx=arrMean(x), my=arrMean(y);
  const num=x.reduce((s,v,i)=>s+(v-mx)*(y[i]-my),0);
  const dx=Math.sqrt(x.reduce((s,v)=>s+(v-mx)**2,0));
  const dy=Math.sqrt(y.reduce((s,v)=>s+(v-my)**2,0));
  return (dx&&dy)?num/(dx*dy):0;
}
function shannonH(w) {
  return -w.reduce((s,v)=>v>0?s+v*Math.log(v):s, 0);
}
const H_MAX7 = Math.log(7); // 1.9459…

// ─────────────────────────────────────────────────────────────
//  ADVANCED STATS — main panel
// ─────────────────────────────────────────────────────────────
function buildAdvancedStats(rows) {
  if (rows.length < 2) return "";
  const PCOLS = ["#2563eb","#0891b2","#059669","#7c3aed","#dc2626","#d97706","#334155"];
  // RGB string equivalents for rgba() usage
  const PRGB  = ["37,99,235","8,145,178","5,150,105","124,58,237","220,38,38","217,119,6","51,65,85"];
  const data  = CRIT.map(c => rows.map(r => parseFloat(r["w_"+c.code])||0));
  const n=rows.length, m=CRIT.length;

  // ── 1. Kendall's W ─────────────────────────────────────────
  const rankMx = rows.map(r => {
    const w=CRIT.map(c=>parseFloat(r["w_"+c.code])||0);
    const ord=w.map((v,i)=>({v,i})).sort((a,b)=>b.v-a.v);
    const rk=new Array(m);
    // handle ties with averaged ranks
    let i=0;
    while(i<ord.length){
      let j=i;
      while(j<ord.length-1 && Math.abs(ord[j].v-ord[j+1].v)<1e-9) j++;
      const avg=(i+j)/2+1;
      for(let k=i;k<=j;k++) rk[ord[k].i]=avg;
      i=j+1;
    }
    return rk;
  });
  const rSums  = CRIT.map((_,j)=>rankMx.reduce((s,r)=>s+r[j],0));
  const rMean  = rSums.reduce((a,b)=>a+b,0)/m;
  const S      = rSums.reduce((s,rs)=>s+(rs-rMean)**2,0);
  // Correction for ties (simplified — assume no ties within same respondent)
  const W      = 12*S/(n*n*(m**3-m));
  const chi2W  = n*(m-1)*W;
  const pvalW  = chi2pval(chi2W, m-1);
  const rankOrder = CRIT.map((c,i)=>({code:c.code,rs:rSums[i],col:PCOLS[i]})).sort((a,b)=>a.rs-b.rs);

  function wLabel(w) {
    if(w>=0.9) return {t:"Exceptional unanimity",c:"#15803d"};
    if(w>=0.7) return {t:"High agreement",c:"#16a34a"};
    if(w>=0.5) return {t:"Moderate agreement",c:"#a16207"};
    if(w>=0.3) return {t:"Weak agreement",c:"#ea580c"};
    return {t:"No consensus",c:"#dc2626"};
  }
  const wl=wLabel(W);
  function pStr(p){
    if(p<0.001) return "p &lt; 0.001 ✓✓✓";
    if(p<0.01)  return `p = ${p.toFixed(3)} ✓✓`;
    if(p<0.05)  return `p = ${p.toFixed(3)} ✓`;
    return `p = ${p.toFixed(3)} (not significant)`;
  }

  // ── 2. Shannon entropy ──────────────────────────────────────
  const entropies = rows.map(r=>{
    const w=CRIT.map(c=>parseFloat(r["w_"+c.code])||0);
    const H=shannonH(w), Hn=H/H_MAX7;
    return {name:r.name||"Anonymous", H, Hn};
  });
  const meanHn=arrMean(entropies.map(e=>e.Hn));
  const entSorted=[...entropies].sort((a,b)=>b.Hn-a.Hn);

  // ── 3. Pearson correlation matrix ───────────────────────────
  const corrMx=CRIT.map((_,i)=>CRIT.map((_,j)=>pearsonR(data[i],data[j])));
  function corrCol(r){
    if(r>=0){const t=r;return `rgb(${Math.round(255*(1-t))},${Math.round(255*(1-t))},255)`;}
    const t=-r; return `rgb(255,${Math.round(255*(1-t))},${Math.round(255*(1-t))})`;
  }

  // ── 4. Rank frequency heatmap ───────────────────────────────
  const rankFreq=CRIT.map(()=>Array(m).fill(0));
  rankMx.forEach(r=>r.forEach((rk,ci)=>{
    const ri=Math.round(rk)-1;
    if(ri>=0&&ri<m) rankFreq[ci][ri]++;
  }));
  const maxFreq=Math.max(...rankFreq.flat(),1);

  // ── 5. Bootstrap 95% CI ─────────────────────────────────────
  const aggW=geoMeanWeights(rows.map(r=>CRIT.map(c=>parseFloat(r["w_"+c.code])||1/7)));
  const bootW=Array.from({length:m},()=>[]);
  for(let b=0;b<500;b++){
    const samp=Array.from({length:n},()=>rows[Math.floor(Math.random()*n)]);
    const w=geoMeanWeights(samp.map(r=>CRIT.map(c=>parseFloat(r["w_"+c.code])||1/7)));
    if(w) w.forEach((v,i)=>bootW[i].push(v));
  }
  const bootCI=CRIT.map((_,i)=>{
    const sv=[...bootW[i]].sort((a,b)=>a-b);
    return {lo:quantile(sv,0.025), hi:quantile(sv,0.975), mn:aggW?aggW[i]:1/7};
  });

  // ── 6. Expert divergence ────────────────────────────────────
  const expertDiv=rows.map(r=>{
    const w=CRIT.map(c=>parseFloat(r["w_"+c.code])||0);
    const d=Math.sqrt(w.reduce((s,v,i)=>s+(v-(aggW?aggW[i]:1/7))**2,0));
    return {name:r.name||"Anonymous", cr:parseFloat(r.cr)||0, d};
  }).sort((a,b)=>b.d-a.d);
  const maxDiv=expertDiv[0]?.d||0.01;

  // ══════════════════════════════════════════════════════════════
  //  SVG: CORRELATION MATRIX
  // ══════════════════════════════════════════════════════════════
  const cz=46, cml=70, cmt=56, cmr=10, cmb=42;
  const cmW=cml+m*cz+cmr, cmH=cmt+m*cz+cmb;

        font-size="11" font-weight="700" fill="${PCOLS[i]}" font-family="monospace">${c.code}</text>`).join('')}
    ${corrMx.map((row,i)=>row.map((r,j)=>{
      const x=cml+j*cz, y=cmt+i*cz, diag=i===j;
      return `<rect x="${x}" y="${y}" width="${cz}" height="${cz}"
        fill="${diag?"#f8fafc":corrCol(r)}" stroke="#e2e8f0" stroke-width="0.6" rx="1"/>
        <text x="${x+cz/2}" y="${y+cz/2}" text-anchor="middle" dominant-baseline="middle"
          font-size="${diag?9:11}" font-weight="${Math.abs(r)>0.4?"700":"400"}"
          fill="${diag?"#94a3b8":Math.abs(r)>0.6?"#1e293b":"#475569"}">${diag?"—":r.toFixed(2)}</text>`;

    }).join('')}
    <text x="${cml}" y="${cmt+m*cz+30}" text-anchor="middle" font-size="9" fill="#94a3b8">−1</text>
    <text x="${cml+m*cz/2}" y="${cmt+m*cz+30}" text-anchor="middle" font-size="9" fill="#64748b">0</text>
    <text x="${cml+m*cz}" y="${cmt+m*cz+30}" text-anchor="middle" font-size="9" fill="#94a3b8">+1</text>
  </svg>`;

  // ══════════════════════════════════════════════════════════════
  //  SVG: RANK FREQUENCY HEATMAP
  // ══════════════════════════════════════════════════════════════
  const rfw=52, rfh=34, rfl=120, rft=28, rfr=10, rfb=24;
  const rfW=rfl+m*rfw+rfr, rfH=rft+m*rfh+rfb;
  const rankFreqSVG=`<svg width="${rfW}" height="${rfH}" viewBox="0 0 ${rfW} ${rfH}"
    xmlns="http://www.w3.org/2000/svg" style="display:block;margin:0 auto">
    ${Array.from({length:m},(_,j)=>`
      <text x="${rfl+j*rfw+rfw/2}" y="${rft-7}" text-anchor="middle"
        font-size="10" font-weight="600" fill="#64748b">${j+1}</text>`).join('')}
    ${CRIT.map((c,i)=>`
      <text x="${rfl-7}" y="${rft+i*rfh+rfh/2}" text-anchor="end" dominant-baseline="middle"
        font-size="11" font-weight="700" fill="${PCOLS[i]}" font-family="monospace">${c.code}</text>
      <text x="${rfl-32}" y="${rft+i*rfh+rfh/2}" text-anchor="end" dominant-baseline="middle"
        font-size="8.5" fill="#94a3b8">${c.name.slice(0,11)}${c.name.length>11?"…":""}</text>`).join('')}
    ${rankFreq.map((row,i)=>row.map((cnt,j)=>{
      const x=rfl+j*rfw, y=rft+i*rfh;
      const alpha=cnt>0?(cnt/maxFreq*0.82+0.12).toFixed(2):"0";
      const textC=cnt/maxFreq>0.55?"#fff":"#334155";
      return `<rect x="${x+1}" y="${y+1}" width="${rfw-2}" height="${rfh-2}"
        fill="rgba(${PRGB[i]},${alpha})" rx="3"/>
        ${cnt>0?`<text x="${x+rfw/2}" y="${y+rfh/2}" text-anchor="middle"
          dominant-baseline="middle" font-size="14" font-weight="700"
          fill="${textC}">${cnt}</text>`:""}`;
    }).join('')).join('')}
    <text x="${rfl+m*rfw/2}" y="${rfH-4}" text-anchor="middle"
      font-size="9" fill="#94a3b8">Rank position (1 = highest weight)</text>
  </svg>`;

  // ══════════════════════════════════════════════════════════════
  //  SVG: BOOTSTRAP CI
  // ══════════════════════════════════════════════════════════════
  const bsl=52, bsr=85, bst=14, bsb=20, bsrH=30, bsW=600;
  const bsH=bst+m*bsrH+bsb;
  const ciMin=Math.min(...bootCI.map(c=>c.lo))*0.80;
  const ciMax=Math.max(...bootCI.map(c=>c.hi))*1.20;
  const bsX=v=>bsl+(v-ciMin)/(ciMax-ciMin)*(bsW-bsl-bsr);
  const bsTicks=[0,.05,.10,.15,.20,.25,.30,.35].filter(t=>t>=ciMin&&t<=ciMax);
  const bootSVG=`<svg width="${bsW}" height="${bsH}" viewBox="0 0 ${bsW} ${bsH}"
    xmlns="http://www.w3.org/2000/svg" style="display:block;margin:0 auto">
    ${bsTicks.map(t=>`
      <line x1="${bsX(t)}" y1="${bst}" x2="${bsX(t)}" y2="${bst+m*bsrH}"
        stroke="${t===0.10||t===0.15?'#bfdbfe':'#f1f5f9'}" stroke-width="${t===0.10||t===0.15?1.2:0.8}"/>
      <text x="${bsX(t)}" y="${bst+m*bsrH+13}" text-anchor="middle"
        font-size="9" fill="#94a3b8">${(t*100).toFixed(0)}%</text>`).join('')}
    ${CRIT.map((c,i)=>{
      const ci=bootCI[i], col=PCOLS[i];
      const y=bst+i*bsrH+bsrH/2;
      const x1=bsX(ci.lo), x2=bsX(ci.hi), xm=bsX(ci.mn);
      return `
        <text x="${bsl-5}" y="${y}" text-anchor="end" dominant-baseline="middle"
          font-size="11" font-weight="700" fill="${col}" font-family="monospace">${c.code}</text>
        <line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="${col}" stroke-width="2" opacity="0.35"/>
        <rect x="${x1}" y="${y-7}" width="${x2-x1}" height="14" fill="${col}22" rx="3"/>
        <line x1="${x1}" y1="${y-8}" x2="${x1}" y2="${y+8}" stroke="${col}" stroke-width="2"/>
        <line x1="${x2}" y1="${y-8}" x2="${x2}" y2="${y+8}" stroke="${col}" stroke-width="2"/>
        <circle cx="${xm}" cy="${y}" r="5.5" fill="${col}"/>
        <text x="${x2+5}" y="${y}" dominant-baseline="middle" font-size="10" font-weight="700" fill="${col}">${(ci.mn*100).toFixed(2)}%</text>
        <text x="${x1-3}" y="${y-10}" text-anchor="end" font-size="8" fill="#94a3b8">${(ci.lo*100).toFixed(1)}%</text>
        <text x="${x2+3}" y="${y-10}" font-size="8" fill="#94a3b8">${(ci.hi*100).toFixed(1)}%</text>`;
    }).join('')}
  </svg>`;

  // ══════════════════════════════════════════════════════════════
  //  SVG: EXPERT DIVERGENCE
  // ══════════════════════════════════════════════════════════════
  const divRH=26, divL=150, divW=580, divH=30+n*divRH;
  const divSVG=`<svg width="${divW}" height="${divH}" viewBox="0 0 ${divW} ${divH}"
    xmlns="http://www.w3.org/2000/svg">
    <text x="${divL}" y="14" font-size="9" fill="#94a3b8">← Closer to consensus</text>
    <text x="${divW-10}" y="14" text-anchor="end" font-size="9" fill="#94a3b8">Further from consensus →</text>
    ${expertDiv.map((e,i)=>{
      const y=22+i*divRH;
      const bw=Math.max((e.d/maxDiv)*(divW-divL-70), 3);
      const barC=i<expertDiv.length*0.25?"#dc2626":i<expertDiv.length*0.75?"#2563eb":"#15803d";
      const crC=e.cr<0.10?"#15803d":e.cr<0.15?"#a16207":"#dc2626";
      return `
        <text x="${divL-5}" y="${y+10}" text-anchor="end" dominant-baseline="middle"
          font-size="11" fill="#334155">${e.name.length>20?e.name.slice(0,20)+"…":e.name}</text>
        <rect x="${divL}" y="${y+3}" width="${bw}" height="14"
          fill="${barC}" opacity="0.20" rx="2"/>
        <rect x="${divL}" y="${y+8}" width="${bw}" height="4"
          fill="${barC}" opacity="0.70" rx="1"/>
        <text x="${divL+bw+6}" y="${y+10}" dominant-baseline="middle"
          font-size="10" font-weight="600" fill="${barC}">${(e.d*100).toFixed(2)}%</text>
        <text x="${divW-5}" y="${y+10}" text-anchor="end" dominant-baseline="middle"
          font-size="9" fill="${crC}">CR:${(e.cr*100).toFixed(1)}%</text>`;
    }).join('')}
  </svg>`;

  // ══════════════════════════════════════════════════════════════
  //  ASSEMBLE HTML
  // ══════════════════════════════════════════════════════════════
  return `<div style="border-top:2px solid #e0e7ff;margin-top:22px;padding-top:20px">
    <div style="font-size:15px;font-weight:700;color:#1e293b;margin-bottom:16px">
      🔬 Advanced statistical analysis</div>

    <!-- ROW A: Kendall W + Entropy -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;align-items:start">

      <!-- Kendall W -->
      <div style="background:#f0fdf4;border:2px solid #86efac;border-radius:12px;padding:18px">
        <div style="font-size:10px;font-weight:600;color:#64748b;text-transform:uppercase;
          letter-spacing:.07em;margin-bottom:8px">Kendall's coefficient of concordance W</div>
        <div style="display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:12px">
          <span style="font-size:56px;font-weight:800;color:${wl.c};font-family:monospace;line-height:1">
            ${W.toFixed(3)}</span>
          <div>
            <div style="font-size:14px;font-weight:700;color:${wl.c}">${wl.t}</div>
            <div style="font-size:11px;color:#64748b;margin-top:3px">
              χ²(${m-1}) = ${chi2W.toFixed(2)} · ${pStr(pvalW)}</div>
            <div style="font-size:10px;color:#94a3b8;margin-top:2px">
              n = ${n} · m = ${m} · W ∈ [0; 1]</div>
          </div>
        </div>
        <div style="font-size:11px;color:#475569;margin-bottom:8px">
          Sum of ranks (lower = higher priority in the group):</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">
          ${rankOrder.map((ro,ri)=>`
          <div style="background:#fff;border:1.5px solid ${ri<2?"#16a34a":"#e2e8f0"};
            border-radius:8px;padding:5px 10px;text-align:center;min-width:52px">
            <div style="font-size:9px;color:#94a3b8">#${ri+1}</div>
            <div style="font-size:14px;font-weight:800;color:${ro.col};font-family:monospace">${ro.code}</div>
            <div style="font-size:10px;color:#64748b;font-weight:600">Σ=${ro.rs.toFixed(1)}</div>
          </div>`).join('')}
        </div>
      </div>

      <!-- Shannon entropy -->
      <div style="background:#faf5ff;border:2px solid #d8b4fe;border-radius:12px;padding:18px">
        <div style="font-size:10px;font-weight:600;color:#64748b;text-transform:uppercase;
          letter-spacing:.07em;margin-bottom:8px">Profile entropy (Shannon)</div>
        <div style="font-size:11px;color:#475569;line-height:1.7;margin-bottom:10px">
          H ∈ [0; ln7 ≈ 1.946] · H<sub>n</sub> = H / H<sub>max</sub><br>
          H<sub>n</sub> → 1: uniform weights (uncertainty) ·
          H<sub>n</sub> → 0: concentrated priority<br>
          <b>Sample mean:</b>
          <span style="font-size:20px;font-weight:800;color:#7c3aed;font-family:monospace">
            ${(meanHn*100).toFixed(1)}%</span>
        </div>
        <div style="max-height:170px;overflow-y:auto;padding-right:4px">
          ${entSorted.map(e=>`
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
            <span style="font-size:10px;color:#475569;width:120px;overflow:hidden;
              text-overflow:ellipsis;white-space:nowrap;flex-shrink:0">${e.name}</span>
            <div style="flex:1;height:9px;background:#f3e8ff;border-radius:5px;overflow:hidden">
              <div style="width:${(e.Hn*100).toFixed(1)}%;height:100%;
                background:#7c3aed;border-radius:5px;opacity:0.75"></div>
            </div>
            <span style="font-size:10px;font-family:monospace;color:#7c3aed;
              width:34px;text-align:right;flex-shrink:0">${(e.Hn*100).toFixed(0)}%</span>
            <span style="font-size:9px;color:#94a3b8;width:44px;flex-shrink:0">
              H=${e.H.toFixed(2)}</span>
          </div>`).join('')}
        </div>
        <div style="font-size:10px;color:#94a3b8;margin-top:8px">
          Sorted: more "dispersed" profiles at the top</div>
      </div>
    </div>

    <!-- ROW B: Correlation matrix + Rank heatmap -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;align-items:start">
      <div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:14px;overflow-x:auto">
        <div style="font-size:12px;font-weight:600;color:#475569;margin-bottom:10px">
          Pearson correlation matrix (between criterion weights)</div>
        ${corrSVG}
        <p style="font-size:10px;color:#94a3b8;margin-top:7px">
          Blue = positive · Red = negative · 
          Negative means: when one criterion is rated higher, the other is rated lower</p>
        ${n<6?`<p style="font-size:10px;color:#a16207;margin-top:3px">
          ⚠ n=${n} — correlations are unstable; n≥10 is recommended</p>`:""}
      </div>
      <div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:14px;overflow-x:auto">
        <div style="font-size:12px;font-weight:600;color:#475569;margin-bottom:10px">
          Rank frequency matrix</div>
        ${rankFreqSVG}
        <p style="font-size:10px;color:#94a3b8;margin-top:7px">
          Cell [criterion × rank] = number of experts who assigned that rank ·
          Darker fill = higher frequency</p>
      </div>
    </div>

    <!-- ROW C: Bootstrap CI -->
    <div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;
      padding:14px;margin-bottom:14px;overflow-x:auto">
      <div style="font-size:12px;font-weight:600;color:#475569;margin-bottom:10px">
        Bootstrap 95% confidence intervals (B = 500)</div>
      ${bootSVG}
      <p style="font-size:10px;color:#94a3b8;margin-top:6px">
        ● = geometric mean · horizontal bar = [2.5%; 97.5%] percentiles ·
        500 resamples with replacement · the wider the CI, the greater the uncertainty of the estimate</p>
    </div>

    <!-- ROW D: Expert divergence -->
    <div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;
      padding:14px;overflow-x:auto">
      <div style="font-size:12px;font-weight:600;color:#475569;margin-bottom:10px">
        Deviation from group consensus (Euclidean distance from the aggregated vector)</div>
      ${divSVG}
      <p style="font-size:10px;color:#94a3b8;margin-top:5px">
        Red = largest deviation · blue = medium · green = closest to consensus ·
        CR of each respondent</p>
    </div>
  </div>`;
}

render();
</script>
</body>
</html>
